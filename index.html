<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Stop Me Now - Queen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: url('https://upload.wikimedia.org/wikipedia/en/9/9e/Queen_Jazz.png') center center no-repeat fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(10, 10, 30, 0.85) 0%,
                rgba(30, 20, 50, 0.75) 50%,
                rgba(20, 15, 35, 0.9) 100%
            );
            backdrop-filter: blur(3px);
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .lyrics-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: clamp(30px, 8vw, 50px) clamp(25px, 6vw, 60px);
            width: 100%;
            text-align: center;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .line-counter {
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
            letter-spacing: 0.15em;
        }

        .lyrics-line {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 400;
            font-style: italic;
            line-height: 1.5;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .lyrics-line.transitioning {
            opacity: 0;
            transform: translateY(-10px);
        }

        .controls {
            display: flex;
            gap: clamp(10px, 3vw, 20px);
            justify-content: center;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        button {
            padding: clamp(10px, 2.5vw, 14px) clamp(20px, 5vw, 32px);
            font-size: clamp(0.8rem, 2vw, 1rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(-1px);
        }

        #prevBtn, #nextBtn {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #prevBtn:hover, #nextBtn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #prevBtn:disabled, #nextBtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        #playBtn {
            background: linear-gradient(135deg, #e8b923 0%, #f4d03f 100%);
            color: #1a1a2e;
            min-width: 120px;
            box-shadow: 0 4px 15px rgba(232, 185, 35, 0.3);
        }

        #playBtn:hover {
            background: linear-gradient(135deg, #f4d03f 0%, #ffe066 100%);
            box-shadow: 0 6px 25px rgba(232, 185, 35, 0.5);
        }

        #playBtn.playing {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        #playBtn.playing:hover {
            background: linear-gradient(135deg, #ff6b5b 0%, #e74c3c 100%);
            box-shadow: 0 6px 25px rgba(231, 76, 60, 0.6);
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e8b923, #f4d03f);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .lyrics-container {
                padding: 25px 20px;
            }

            .lyrics-line {
                min-height: 80px;
            }

            .controls {
                gap: 8px;
            }

            button {
                padding: 10px 18px;
                font-size: 0.75rem;
            }

            #playBtn {
                min-width: 100px;
            }
        }

        @media (max-width: 360px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            #prevBtn, #nextBtn {
                order: 2;
            }

            #playBtn {
                order: 1;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h1>Don't Stop Me Now</h1>
        <div class="subtitle">Queen</div>

        <div class="lyrics-container">
            <div class="line-counter">Line <span id="currentLine">1</span> of <span id="totalLines">50</span></div>
            <div class="lyrics-line" id="lyricsDisplay"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="controls">
                <button id="prevBtn">Previous</button>
                <button id="playBtn">Play</button>
                <button id="nextBtn">Next</button>
            </div>
        </div>
    </div>

    <script>
        const lyrics = [
            "Tonight, I'm gonna have myself a real good time",
            "I feel alive",
            "And the world, I'll turn it inside out, yeah",
            "I'm floating around in ecstasy, so",
            "(Don't stop me now, don't stop me)",
            "'Cause I'm having a good time, having a good time",
            "I'm a shooting star, leaping through the sky",
            "Like a tiger defying the laws of gravity",
            "I'm a racing car, passing by like Lady Godiva",
            "I'm gonna go, go, go",
            "There's no stopping me",
            "I'm burnin' through the sky, yeah",
            "Two hundred degrees, that's why they call me Mister Fahrenheit",
            "I'm traveling at the speed of light",
            "I wanna make a supersonic man out of you",
            "I'm having such a good time, I'm having a ball",
            "(Don't stop me now)",
            "If you wanna have a good time, just give me a call",
            "(Don't stop me now) 'Cause I'm having a good time",
            "(Don't stop me now) Yes, I'm having a good time",
            "I don't want to stop at all, yeah",
            "I'm a rocket ship on my way to Mars",
            "On a collision course",
            "I am a satellite, I'm out of control",
            "I'm a sex machine, ready to reload",
            "Like an atom bomb",
            "About to oh, oh, oh, oh, oh explode",
            "I'm burnin' through the sky, yeah",
            "Two hundred degrees, that's why they call me Mister Fahrenheit",
            "I'm traveling at the speed of light",
            "I wanna make a supersonic woman of you",
            "Hey, hey, hey",
            "(Don't stop me, don't stop me, ooh, ooh, ooh) I like it",
            "(Don't stop me, don't stop me) Have a good time, good time",
            "(Don't stop me, don't stop me) Ooh, let loose, honey, alright",
            "Oh, I'm burnin' through the sky, yeah",
            "Two hundred degrees, that's why they call me Mister Fahrenheit",
            "I'm traveling at the speed of light",
            "I wanna make a supersonic man out of you",
            "I'm having such a good time, I'm having a ball",
            "(Don't stop me now)",
            "If you wanna have a good time, just give me a call",
            "(Don't stop me now) 'Cause I'm having a good time",
            "(Don't stop me now) Yes, I'm having a good time",
            "I don't want to stop at all",
            "La, da-da-da-da",
            "Da-da-da, ha",
            "Ha, da-da, ha, ha, ha",
            "Ha, da-da, ha, da-da, ah",
            "Ooh-ooh-ooh"
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let playInterval;

        const lyricsDisplay = document.getElementById('lyricsDisplay');
        const currentLineEl = document.getElementById('currentLine');
        const totalLinesEl = document.getElementById('totalLines');
        const progressFill = document.getElementById('progressFill');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');

        function updateProgress() {
            const progress = ((currentIndex + 1) / lyrics.length) * 100;
            progressFill.style.width = progress + '%';
        }

        function updateButtons() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === lyrics.length - 1;
        }

        function displayLine() {
            lyricsDisplay.classList.add('transitioning');

            setTimeout(() => {
                lyricsDisplay.textContent = lyrics[currentIndex];
                currentLineEl.textContent = currentIndex + 1;
                updateProgress();
                updateButtons();
                lyricsDisplay.classList.remove('transitioning');
            }, 200);
        }

        function nextLine() {
            if (currentIndex < lyrics.length - 1) {
                currentIndex++;
                displayLine();
            }
        }

        function prevLine() {
            if (currentIndex > 0) {
                currentIndex--;
                displayLine();
            }
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playBtn.textContent = 'Pause';
                playBtn.classList.add('playing');
                playInterval = setInterval(() => {
                    if (currentIndex < lyrics.length - 1) {
                        nextLine();
                    } else {
                        stopPlay();
                    }
                }, 2000);
            } else {
                stopPlay();
            }
        }

        function stopPlay() {
            isPlaying = false;
            playBtn.textContent = 'Play';
            playBtn.classList.remove('playing');
            clearInterval(playInterval);
        }

        prevBtn.addEventListener('click', () => {
            stopPlay();
            prevLine();
        });

        nextBtn.addEventListener('click', () => {
            stopPlay();
            nextLine();
        });

        playBtn.addEventListener('click', togglePlay);

        totalLinesEl.textContent = lyrics.length;
        displayLine();
    </script>
</body>
</html>
