<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Display</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .lyrics-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 60px;
            min-width: 300px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lyrics-line {
            font-size: 1.5rem;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .line-counter {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #prevBtn, #nextBtn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        #prevBtn:hover, #nextBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #playBtn {
            background: #4ade80;
            color: #1a1a2e;
        }

        #playBtn:hover {
            background: #22c55e;
        }

        #playBtn.playing {
            background: #f87171;
        }

        #playBtn.playing::content {
            content: "Pause";
        }
    </style>
</head>
<body>
    <h1>Don't Stop Me Now - Queen</h1>
    <div class="lyrics-container">
        <div class="line-counter"><span id="currentLine">1</span> / <span id="totalLines">50</span></div>
        <div class="lyrics-line" id="lyricsDisplay"></div>
        <div class="controls">
            <button id="prevBtn">Previous</button>
            <button id="playBtn">Play</button>
            <button id="nextBtn">Next</button>
        </div>
    </div>

    <script>
        const lyrics = [
            "Tonight, I'm gonna have myself a real good time",
            "I feel alive",
            "And the world, I'll turn it inside out, yeah",
            "I'm floating around in ecstasy, so",
            "(Don't stop me now, don't stop me)",
            "'Cause I'm having a good time, having a good time",
            "I'm a shooting star, leaping through the sky",
            "Like a tiger defying the laws of gravity",
            "I'm a racing car, passing by like Lady Godiva",
            "I'm gonna go, go, go",
            "There's no stopping me",
            "I'm burnin' through the sky, yeah",
            "Two hundred degrees, that's why they call me Mister Fahrenheit",
            "I'm traveling at the speed of light",
            "I wanna make a supersonic man out of you",
            "I'm having such a good time, I'm having a ball",
            "(Don't stop me now)",
            "If you wanna have a good time, just give me a call",
            "(Don't stop me now) 'Cause I'm having a good time",
            "(Don't stop me now) Yes, I'm having a good time",
            "I don't want to stop at all, yeah",
            "I'm a rocket ship on my way to Mars",
            "On a collision course",
            "I am a satellite, I'm out of control",
            "I'm a sex machine, ready to reload",
            "Like an atom bomb",
            "About to oh, oh, oh, oh, oh explode",
            "I'm burnin' through the sky, yeah",
            "Two hundred degrees, that's why they call me Mister Fahrenheit",
            "I'm traveling at the speed of light",
            "I wanna make a supersonic woman of you",
            "Hey, hey, hey",
            "(Don't stop me, don't stop me, ooh, ooh, ooh) I like it",
            "(Don't stop me, don't stop me) Have a good time, good time",
            "(Don't stop me, don't stop me) Ooh, let loose, honey, alright",
            "Oh, I'm burnin' through the sky, yeah",
            "Two hundred degrees, that's why they call me Mister Fahrenheit",
            "I'm traveling at the speed of light",
            "I wanna make a supersonic man out of you",
            "I'm having such a good time, I'm having a ball",
            "(Don't stop me now)",
            "If you wanna have a good time, just give me a call",
            "(Don't stop me now) 'Cause I'm having a good time",
            "(Don't stop me now) Yes, I'm having a good time",
            "I don't want to stop at all",
            "La, da-da-da-da",
            "Da-da-da, ha",
            "Ha, da-da, ha, ha, ha",
            "Ha, da-da, ha, da-da, ah",
            "Ooh-ooh-ooh"
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let playInterval;

        const lyricsDisplay = document.getElementById('lyricsDisplay');
        const currentLineEl = document.getElementById('currentLine');
        const totalLinesEl = document.getElementById('totalLines');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');

        function displayLine() {
            lyricsDisplay.textContent = lyrics[currentIndex];
            currentLineEl.textContent = currentIndex + 1;
        }

        function nextLine() {
            if (currentIndex < lyrics.length - 1) {
                currentIndex++;
                displayLine();
            }
        }

        function prevLine() {
            if (currentIndex > 0) {
                currentIndex--;
                displayLine();
            }
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playBtn.textContent = 'Pause';
                playBtn.classList.add('playing');
                playInterval = setInterval(() => {
                    if (currentIndex < lyrics.length - 1) {
                        nextLine();
                    } else {
                        stopPlay();
                    }
                }, 2000);
            } else {
                stopPlay();
            }
        }

        function stopPlay() {
            isPlaying = false;
            playBtn.textContent = 'Play';
            playBtn.classList.remove('playing');
            clearInterval(playInterval);
        }

        prevBtn.addEventListener('click', () => {
            stopPlay();
            prevLine();
        });

        nextBtn.addEventListener('click', () => {
            stopPlay();
            nextLine();
        });

        playBtn.addEventListener('click', togglePlay);

        totalLinesEl.textContent = lyrics.length;
        displayLine();
    </script>
</body>
</html>
